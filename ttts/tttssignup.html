<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="ttts.css">
        
    </head>
    <body>
        <img id="logo" src="ttts.png">
        <h1 id="h1">Hello, welcome to <span id="span1">The Total Tech School</span></h1>
        <p id="para1"> Complete the form below to create an account</p>
        <form id="signup-form">
            <input class = "inputs" id="userfn" type="text" placeholder="First Name" required>
            <input class = "inputs" id="userln" type="text" placeholder="Last Name" required>
            <input class = "inputs" id="userphone" type="text" placeholder="Phone Number" required>
            <input class = "inputs" id="useremail" type="email" placeholder="Email" required>
            <input class = "inputs" id="userdob" type="date" placeholder="Birth Date DD MM YY" required>
            <input class = "inputs" id="password" type="password" placeholder="Password" required>
            <input class = "inputs" id="userdp" type="file" placeholder="Attach profile photo">
            <button class="submit-btn" id="signup-btn" type="submit">SignUp</button> 
        </form>
        
    <script src="ttts-signupform.js"></script>
    </body>
</html>
